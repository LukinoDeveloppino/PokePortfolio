<style>
/* ════════════════════════════════════════════════════════════════════
   style.html — RIFERIMENTO (non incluso). Il CSS attivo è in desktop.html.
   Le modifiche vanno fatte su desktop.html, non qui.
   ════════════════════════════════════════════════════════════════════ */


/* ═══════════ 1. VARIABILI E RESET ═══════════ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

/* Reset minimale: box-sizing prevedibile e azzeramento margini/padding */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Colori di base del tema */
  --bg:             #0f0f1a;                 /* sfondo pagina */
  --card-bg:        #1a1a2e;                 /* sfondo card/pannelli */
  --card-bg-hover:  #1f1f3a;                 /* sfondo card al passaggio del mouse */
  --accent:         #e8c84a;                 /* giallo Pokémon (accento primario) */
  --accent-dim:     #b89d35;                 /* giallo scurito (hover) */
  --blue:           #4a9eff;                 /* blu elettrico (accento secondario) */
  --blue-dim:       #2a6ecc;                 /* blu scurito */
  --text:           #f0f0f0;                 /* testo primario */
  --text-secondary: #8888aa;                 /* testo secondario */
  --border:         rgba(255,255,255,0.08);  /* bordo sottile standard */
  --border-accent:  rgba(232,200,74,0.3);    /* bordo color accento */
  --danger:         #e85a4a;                 /* rosso per errori/eliminazioni */
  --success:        #4ae87a;                 /* verde per messaggi di successo */

  /* Misure e transizioni riutilizzate ovunque */
  --radius:     10px;
  --radius-sm:  6px;
  --shadow:     0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.18s ease;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}


/* ═══════════ 2. BARRA NOTIFICHE ═══════════
   Barra fissa in cima. Di default è nascosta; le classi .error /
   .success / .info (impostate da showNotification) la mostrano con il
   colore appropriato. */

#notification-bar {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 9999;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 500;
  text-align: center;
  animation: slideDown 0.2s ease;
}
#notification-bar.error   { background: var(--danger);  color: #fff;     display: block; }
#notification-bar.success { background: var(--success); color: #0f1a0f;  display: block; }
#notification-bar.info    { background: var(--blue);    color: #fff;     display: block; }

@keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }


/* ═══════════ 3. PAGINA DI LOGIN ═══════════ */

#login-page {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  /* Leggero alone luminoso al centro per dare profondità */
  background: radial-gradient(ellipse at 50% 40%, #1a1a3e 0%, var(--bg) 70%);
}
.login-box {
  background: var(--card-bg);
  border: 1px solid var(--border-accent);
  border-radius: 16px;
  padding: 48px 40px;
  width: 360px;
  text-align: center;
  box-shadow: 0 0 60px rgba(232,200,74,0.08); /* glow dorato attorno al box */
}
.login-logo {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}
.login-subtitle {
  color: var(--text-secondary);
  font-size: 13px;
  margin-bottom: 32px;
}

/* Campi di input (username, password, sheet id) */
.login-box input[type="password"],
.login-box input[type="text"],
.login-box textarea {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color var(--transition);
  margin-bottom: 12px;
}
.login-box input[type="password"]:focus,
.login-box input[type="text"]:focus,
.login-box textarea:focus { border-color: var(--accent); }

/* Pulsante di submit (Accedi / Crea account) */
.login-box form button {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #0f0f1a;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: background var(--transition);
  margin-top: 4px;
}
.login-box form button:hover { background: var(--accent-dim); }

/* Tab Accedi / Registrati */
.login-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.04);
  padding: 3px;
}
.login-tab {
  flex: 1;
  padding: 8px 12px;
  border: none;
  border-radius: calc(var(--radius-sm) - 2px);
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all var(--transition);
}
.login-tab.active {
  background: var(--accent);
  color: #0f0f1a;
  font-weight: 600;
}


/* ═══════════ 4. NAVBAR ═══════════
   Fissa in alto, semi-trasparente con sfocatura dello sfondo. */

#navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(15,15,26,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 0;
}
.nav-brand {
  font-size: 17px;
  font-weight: 700;
  color: var(--accent);
  margin-right: 32px;
  letter-spacing: -0.3px;
}
.nav-links {
  display: flex;
  gap: 4px;
  flex: 1;
}
.nav-link {
  padding: 6px 16px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  border: none;
  background: none;
  font-family: 'Inter', sans-serif;
}
.nav-link:hover  { color: var(--text);   background: rgba(255,255,255,0.05); }
.nav-link.active { color: var(--accent); background: rgba(232,200,74,0.1);   }

/* Pulsanti a destra della navbar */
.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-left: auto;
}
.btn-sync {
  padding: 6px 14px;
  background: rgba(74,158,255,0.15);
  border: 1px solid rgba(74,158,255,0.3);
  border-radius: var(--radius-sm);
  color: var(--blue);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  font-family: 'Inter', sans-serif;
}
.btn-sync:hover    { background: rgba(74,158,255,0.25); }
.btn-sync:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-logout {
  padding: 6px 14px;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
  font-family: 'Inter', sans-serif;
}
.btn-logout:hover { border-color: var(--danger); color: var(--danger); }


/* ═══════════ 5. CONTENUTO PRINCIPALE E SEZIONI ═══════════ */

/* L'app è nascosta finché non si fa il login (gestito da script.html) */
#app-container { display: none; }

#main-content {
  margin-top: 56px;           /* lascia spazio alla navbar fissa */
  padding: 24px;
  max-width: 1400px;          /* limita la larghezza su schermi grandi */
  margin-left: auto;
  margin-right: auto;
}

/* Le tre sezioni esistono tutte nel DOM: solo .active è visibile */
.section        { display: none; }
.section.active { display: block; }


/* ═══════════ 6. SPINNER DI CARICAMENTO ═══════════ */

.loading-spinner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 0;
  gap: 16px;
  color: var(--text-secondary);
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);  /* solo il bordo superiore colorato → effetto rotante */
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }


/* ═══════════ 7. BARRA DI RICERCA ═══════════ */

.search-bar-wrapper {
  margin-bottom: 24px;
  position: relative;          /* per posizionare l'icona 🔍 dentro l'input */
}
.search-bar-wrapper input {
  width: 100%;
  max-width: 480px;
  padding: 10px 16px 10px 40px; /* padding sinistro extra per l'icona */
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color var(--transition);
}
.search-bar-wrapper input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  font-size: 16px;
  pointer-events: none;        /* l'icona non intercetta i click */
}


/* ═══════════ 8. CATALOGO: INTESTAZIONI DEI SET ═══════════
   Ogni set ha una barra cliccabile (logo + nome + contatore) che apre
   o chiude la griglia delle sue carte. */

.set-group { margin-bottom: 8px; }

.set-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;           /* evita selezioni accidentali del testo */
}
.set-header:hover { border-color: var(--border-accent); background: var(--card-bg-hover); }

/* Quando il set è aperto, l'intestazione si "fonde" con il contenitore
   sottostante (angoli inferiori dritti, bordo inferiore trasparente). */
.set-header.open {
  border-radius: var(--radius) var(--radius) 0 0;
  border-bottom-color: transparent;
}

.set-logo {
  height: 32px;
  width: auto;
  object-fit: contain;
  filter: brightness(0.9);
}
.set-logo-placeholder {
  width: 60px; height: 32px;
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
}
.set-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  flex: 1;                     /* occupa lo spazio rimanente */
}

/* Contatore "X/Y possedute": grigio se 0, dorato se almeno una */
.set-counter {
  font-size: 12px;
  color: var(--text-secondary);
  background: rgba(255,255,255,0.05);
  padding: 3px 10px;
  border-radius: 20px;
}
.set-counter.has-cards { color: var(--accent); background: rgba(232,200,74,0.12); }

/* Freccia ▾ che ruota quando il set è aperto */
.set-chevron {
  color: var(--text-secondary);
  font-size: 18px;
  transition: transform var(--transition);
}
.set-header.open .set-chevron { transform: rotate(180deg); }


/* ═══════════ 9. GRIGLIA CARTE E MINIATURE ═══════════ */

/* Contenitore delle carte di un set (visibile solo se .open) */
.set-cards-container {
  display: none;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-top: none;            /* il bordo superiore è dell'intestazione */
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 16px;
}
.set-cards-container.open { display: block; }

/* Griglia responsive: colonne automatiche di almeno 140px */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}

/* Singola miniatura carta */
.card-thumb {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;          /* per posizionare il badge "X copie" */
}
/* Effetto glow dorato al passaggio del mouse */
.card-thumb:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 0 20px rgba(232,200,74,0.2);
}
.card-thumb img {
  width: 100%;
  aspect-ratio: 245/342;       /* proporzioni standard di una carta Pokémon */
  object-fit: cover;
  display: block;
  background: #1a1a2e;
}

/* Placeholder grigio mostrato se l'immagine non carica */
.card-thumb-placeholder {
  width: 100%;
  aspect-ratio: 245/342;
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text-secondary);
  text-align: center;
  padding: 8px;
}

.card-info { padding: 8px; }
.card-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;     /* tronca i nomi lunghi con ... */
  margin-bottom: 4px;
}
.card-number {
  font-size: 10px;
  color: var(--text-secondary);
}

/* Badge dorato "N copie" in alto a destra della miniatura */
.card-owned-badge {
  position: absolute;
  top: 6px;
  right: 6px;
  background: var(--accent);
  color: #0f0f1a;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
}


/* ═══════════ 10. BADGE RARITÀ ═══════════
   Colori: comune=grigio, non comune=verde, raro=blu,
   ultra raro=viola, speciale=dorato. */

.rarity-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 3px;
  margin-top: 3px;
}
.rarity-common   { background: rgba(136,136,170,0.2); color: #aaaacc; }
.rarity-uncommon { background: rgba(74,200,120,0.2);  color: #4ec878; }
.rarity-rare     { background: rgba(74,158,255,0.2);  color: var(--blue); }
.rarity-ultra    { background: rgba(180,74,255,0.2);  color: #b44aff; }
.rarity-special  { background: rgba(232,200,74,0.2);  color: var(--accent); }


/* ═══════════ 11. RISULTATI DI RICERCA ═══════════
   Quando la ricerca è attiva le carte vengono mostrate in una griglia
   piatta, senza divisione per set. */

.search-results-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}


/* ═══════════ 12. MODAL CARTA ═══════════ */

/* Sfondo scuro a tutto schermo; il modal si apre con la classe .open */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 700px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }

/* Intestazione: immagine a sinistra, dettagli a destra, X di chiusura */
.modal-header {
  display: flex;
  gap: 24px;
  padding: 24px;
  border-bottom: 1px solid var(--border);
}
.modal-card-img {
  width: 160px;
  flex-shrink: 0;
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.modal-card-img img { width: 100%; display: block; }
.modal-card-details { flex: 1; }
.modal-card-name {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.modal-card-meta {
  color: var(--text-secondary);
  font-size: 13px;
  line-height: 1.8;
}
.modal-close {
  position: sticky;            /* resta visibile anche scorrendo il modal */
  top: 16px;
  float: right;
  background: rgba(255,255,255,0.08);
  border: none;
  color: var(--text);
  width: 32px; height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition);
  font-family: 'Inter', sans-serif;
  flex-shrink: 0;
}
.modal-close:hover { background: rgba(255,255,255,0.15); }

.modal-body { padding: 24px; }
.modal-section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}


/* ═══════════ 13. VARIANTI NEL MODAL + FORM "AGGIUNGI" ═══════════ */

/* Riga di una variante posseduta: descrizione | quantità | prezzo | + | − */
.variant-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.variant-info { flex: 1; font-size: 13px; }
.variant-qty {
  font-size: 13px;
  color: var(--text-secondary);
  min-width: 60px;
  text-align: center;
}
.variant-price {
  font-size: 13px;
  color: var(--accent);
  min-width: 80px;
  text-align: right;
}
.variant-price.unavailable { color: var(--text-secondary); font-style: italic; }

/* Pulsanti rotondi + e − */
.btn-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: none;
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  font-family: 'Inter', sans-serif;
  flex-shrink: 0;
}
.btn-icon:hover       { border-color: var(--accent); color: var(--accent); }
.btn-icon.minus:hover { border-color: var(--danger); color: var(--danger); }

/* Contenitore prezzo con spinner che copre l'intera sezione durante il caricamento */
.price-section {
  position: relative;
  min-height: 40px;
}
.price-spinner-overlay {
  position: absolute;
  inset: 0;
  background: var(--card-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  z-index: 2;
}

/* Form per aggiungere una nuova variante */
.add-variant-form {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-top: 12px;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;  /* due campi affiancati */
  gap: 10px;
  margin-bottom: 10px;
}
.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 5px;
}
.form-group select,
.form-group input[type="number"] {
  width: 100%;
  padding: 8px 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color var(--transition);
}
.form-group select:focus,
.form-group input[type="number"]:focus { border-color: var(--accent); }
.form-group select option { background: #1a1a2e; } /* sfondo scuro per le opzioni */


/* ═══════════ 14. PULSANTI GENERALI ═══════════ */

.btn {
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all var(--transition);
  border: none;
}
.btn-primary       { background: var(--accent); color: #0f0f1a; }
.btn-primary:hover { background: var(--accent-dim); }
.btn-secondary {
  background: rgba(255,255,255,0.06);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: rgba(255,255,255,0.1); }
.btn-danger {
  background: rgba(232,90,74,0.15);
  color: var(--danger);
  border: 1px solid rgba(232,90,74,0.3);
}
.btn-danger:hover { background: rgba(232,90,74,0.25); }

/* Variante compatta (usata nella sezione Amici) */
.btn-sm { padding: 6px 12px; font-size: 12px; }




/* ═══════════ 16. STATISTICHE (DASHBOARD) ═══════════
   Le tre card in cima alla sezione Portfolio. */

.dashboard-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
}
.stat-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.stat-value      { font-size: 32px; font-weight: 700; color: var(--accent); }
.stat-value.blue { color: var(--blue); }
.stat-currency   { font-size: 18px; font-weight: 400; color: var(--text-secondary); }


/* ═══════════ 17. EMPTY STATE ═══════════
